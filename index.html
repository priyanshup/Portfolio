<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Google Analytics 4 ─────────────────────────────────────── -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-43E3DDMJLM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Basic config — sends page_view automatically
      gtag('config', 'G-43E3DDMJLM', {
        // Sends the full path including the hash for HashRouter
        page_path: window.location.pathname + window.location.hash,
        // Anonymise IPs for GDPR best practice
        anonymize_ip: true,
      });
    </script>
    <!-- ── End Google Analytics ──────────────────────────────────── -->
     
    <!-- ── Primary meta ─────────────────────────────────────────────── -->
    <title>Priyanshu Pushpam — Technical Product Leader</title>
    <meta name="description" content="Technical Product Leader with 10 years of experience across e-commerce, gaming, and healthcare. Scaling platforms from zero to global using AI, cloud, and cross-functional leadership." />
    <meta name="author" content="Priyanshu Pushpam" />
    <meta name="keywords" content="Product Manager, Product Owner, Technical PM, AI Product, E-commerce, Sportsbook, Healthcare, CSPO, GCP, AWS" />

    <!-- ── Favicon ───────────────────────────────────────────────────── -->
    <!--
      logo.png must be in your /public folder.
      Browsers that support PNG favicons will use it directly.
      For best cross-browser support, also add a 32×32 PNG named favicon.png.
    -->
    <link rel="icon"       type="image/png" href="/Portfolio/logo.png" />
    <link rel="apple-touch-icon"            href="/Portfolio/logo.png" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp, Slack) ─────────── -->
    <!--
      og:image must be an ABSOLUTE URL pointing to a publicly accessible image.
      Recommended size: 1200×630px. Save it as /public/og-image.png.

      Create a simple OG image: dark background (#0f172a), your name in
      large Syne font, your title below it, and the logo top-left.
      Canva has a free "LinkedIn banner" template (1200×627) that works well.
    -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://priyanshup.github.io/Portfolio/" />
    <meta property="og:title"       content="Priyanshu Pushpam — Technical Product Leader" />
    <meta property="og:description" content="Technical Product Leader with 10 years of experience. Scaling platforms from zero to global using AI, cloud, and cross-functional leadership." />
    <meta property="og:image"       content="https://priyanshup.github.io/Portfolio/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Priyanshu Pushpam Portfolio" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://priyanshup.github.io/Portfolio/" />
    <meta name="twitter:title"       content="Priyanshu Pushpam — Technical Product Leader" />
    <meta name="twitter:description" content="Technical Product Leader with 10 years of experience. Scaling platforms from zero to global using AI, cloud, and cross-functional leadership." />
    <meta name="twitter:image"       content="https://priyanshup.github.io/Portfolio/og-image.png" />

    <!-- ── LinkedIn specific ─────────────────────────────────────────── -->
    <!--
      LinkedIn uses og: tags above. No separate tags needed.
      However LinkedIn caches OG data heavily — after deploying, use
      https://www.linkedin.com/post-inspector/ to force a cache refresh.
    -->

    <!-- ── Theme colour (browser chrome on mobile) ───────────────────── -->
    <meta name="theme-color" content="#0f172a" />
    <script type="module" crossorigin src="/Portfolio/assets/index-wbyfFz21.js"></script>
    <link rel="stylesheet" crossorigin href="/Portfolio/assets/index-Rmy4jiEJ.css">
